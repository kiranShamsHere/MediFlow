name: Security & Vulnerability Scan

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC
  workflow_dispatch: # Allows manual run by maintainers

jobs:
  secret_scan:
    name: Secret & Key Leak Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full commit history required for scanning

      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail: true

  codeql_analysis:
    name: CodeQL Static Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript-typescript' # Scan Cloud Functions JS files

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency_audit:
    name: Package Vulnerability Auditing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Audit Node.js Dependencies
        working-directory: functions
        run: |
          npm audit --audit-level=high || echo "High-level dependencies issues found. Maintainers should review."

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          pub-cache: true

      - name: Audit Flutter Dependencies
        run: |
          flutter pub get
          flutter pub outdated
